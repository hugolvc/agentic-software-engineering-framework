<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neo-Brutalism Profile Mockup</title>
    <style>
        :root {
            --bg-color: #E0FF4F;
            /* Vibrant Yellow */
            --primary-color: #FF6B6B;
            /* Bold Red */
            --secondary-color: #4ECDC4;
            /* Tiffany Blue */
            --border-width: 3px;
            --shadow-offset: 6px;
        }

        body {
            font-family: 'Space Mono', 'Courier New', monospace;
            background-color: var(--bg-color);
            color: #000;
            margin: 0;
            padding: 40px;
            min-height: 100vh;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: 300px 1fr;
            gap: 40px;
        }

        /* Components */
        .card {
            background-color: #fff;
            border: var(--border-width) solid #000;
            padding: 20px;
            box-shadow: var(--shadow-offset) var(--shadow-offset) 0px 0px #000;
            margin-bottom: 30px;
        }

        .btn {
            display: inline-block;
            padding: 10px 20px;
            font-size: 1rem;
            font-weight: bold;
            text-transform: uppercase;
            text-decoration: none;
            border: var(--border-width) solid #000;
            box-shadow: 4px 4px 0px 0px #000;
            transition: all 0.1s;
            cursor: pointer;
            background: #fff;
        }

        .btn:active {
            box-shadow: 2px 2px 0px 0px #000;
            transform: translate(2px, 2px);
        }

        .btn-primary {
            background-color: var(--secondary-color);
        }

        .btn-action {
            background-color: var(--primary-color);
            color: #fff;
        }

        .input-brutal {
            width: 100%;
            padding: 10px;
            border: var(--border-width) solid #000;
            box-shadow: 4px 4px 0px 0px #000;
            font-family: inherit;
            margin-bottom: 10px;
            outline: none;
        }

        .input-brutal:focus {
            background-color: #f0f0f0;
        }

        /* Sidebar Profile */
        .avatar {
            width: 150px;
            height: 150px;
            background-color: #000;
            border: var(--border-width) solid #000;
            box-shadow: 6px 6px 0px 0px var(--primary-color);
            margin: 0 auto 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-size: 3rem;
            font-weight: bold;
        }

        .nav-item {
            display: block;
            padding: 10px;
            border: var(--border-width) solid #000;
            margin-bottom: 10px;
            text-decoration: none;
            color: #000;
            font-weight: bold;
            text-transform: uppercase;
            background: #fff;
        }

        .nav-item:hover,
        .nav-item.active {
            background-color: var(--secondary-color);
            box-shadow: 4px 4px 0px 0px #000;
        }

        /* Form Controls */
        label {
            display: block;
            font-weight: bold;
            text-transform: uppercase;
            margin-bottom: 5px;
            background: #000;
            color: #fff;
            display: inline-block;
            padding: 2px 5px;
        }

        .check-group {
            border: var(--border-width) solid #000;
            padding: 10px;
            background: #fff;
            margin-top: 5px;
        }

        /* Custom Check/Radio */
        .check-input {
            appearance: none;
            width: 20px;
            height: 20px;
            border: 2px solid #000;
            background: #fff;
            cursor: pointer;
            position: relative;
            vertical-align: middle;
            margin-right: 10px;
        }

        .check-input:checked {
            background: #000;
        }

        .radio-input {
            border-radius: 50%;
        }

        /* Table */
        table {
            width: 100%;
            border-collapse: separate;
            border-spacing: 0;
            border: var(--border-width) solid #000;
        }

        th,
        td {
            border: 1px solid #000;
            padding: 10px;
            text-align: left;
        }

        th {
            background-color: #000;
            color: #fff;
            text-transform: uppercase;
        }

        td {
            background-color: #fff;
        }

        /* Chart */
        .chart-brutal {
            display: flex;
            align-items: flex-end;
            justify-content: space-around;
            height: 200px;
            border-bottom: var(--border-width) solid #000;
            padding-bottom: 5px;
        }

        .bar-brutal {
            width: 40px;
            background-color: #000;
            border: 2px solid #000;
        }

        .bar-brutal:hover {
            background-color: var(--primary-color);
            transform: translateY(-5px);
            box-shadow: 4px 4px 0px 0px #000;
        }
    </style>
</head>

<body>
    <div class="container">
        <!-- Sidebar -->
        <div class="card">
            <div class="avatar">NB</div>
            <h2 style="text-align: center; text-transform: uppercase; background: #000; color: #fff;">Neo User</h2>
            <p style="text-align: center; font-weight: bold;">Brutalist Designer</p>

            <nav style="margin-top: 30px;">
                <a href="#" class="nav-item active">Profile</a>
                <a href="#" class="nav-item">Works</a>
                <a href="#" class="nav-item">Settings</a>
            </nav>

            <div style="margin-top: 30px; border: 3px solid #000; padding: 10px; background: #fff;">
                <label>PREFERENCES</label>
                <div style="margin-top: 10px;">
                    <div><input type="checkbox" class="check-input" checked> <b>BOLD MODE</b></div>
                    <div style="margin-top: 5px;"><input type="checkbox" class="check-input"> <b>NOISE</b></div>
                </div>
            </div>
        </div>

        <!-- Main Content -->
        <div>
            <!-- Form Card -->
            <div class="card" style="background-color: #FF9F1C;">
                <h2
                    style="margin-top: 0; text-transform: uppercase; border-bottom: 3px solid #000; display: inline-block;">
                    Edit Details</h2>
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 20px;">
                    <div>
                        <label>USERNAME</label>
                        <input type="text" class="input-brutal" value="neo_brutal_guy">
                    </div>
                    <div>
                        <label>EMAIL</label>
                        <input type="email" class="input-brutal" value="guy@brutal.ism">
                    </div>
                </div>

                <div style="margin-top: 20px;">
                    <label>ACCESS LEVEL</label>
                    <div class="check-group">
                        <label style="margin-right: 20px;"><input type="radio" name="access"
                                class="check-input radio-input" checked> ADMIN</label>
                        <label><input type="radio" name="access" class="check-input radio-input"> VISITOR</label>
                    </div>
                </div>

                <div style="margin-top: 20px; display: flex; gap: 15px;">
                    <button class="btn btn-primary">SAVE DATA</button>
                    <button class="btn">CANCEL</button>
                    <button class="btn btn-action" style="margin-left: auto;">DELETE</button>
                </div>
            </div>

            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 30px;">

                <!-- Chart Card -->
                <div class="card">
                    <h3
                        style="margin-top: 0; text-transform: uppercase; background: #000; color: #fff; display: inline-block; padding: 2px 5px;">
                        IMPACT</h3>
                    <div class="chart-brutal">
                        <div class="bar-brutal" style="height: 40%"></div>
                        <div class="bar-brutal" style="height: 80%; background-color: var(--secondary-color);"></div>
                        <div class="bar-brutal" style="height: 30%"></div>
                        <div class="bar-brutal" style="height: 90%; background-color: var(--primary-color);"></div>
                        <div class="bar-brutal" style="height: 60%"></div>
                    </div>
                </div>

                <!-- Table Card -->
                <div class="card" style="padding: 0; border: none; box-shadow: none; background: transparent;">
                    <div class="card" style="margin-bottom: 0;">
                        <h3 style="margin-top: 0; text-transform: uppercase;">LOGS</h3>
                        <table>
                            <thead>
                                <tr>
                                    <th>ACTION</th>
                                    <th>TIME</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr>
                                    <td>LOGIN</td>
                                    <td>10:00</td>
                                </tr>
                                <tr>
                                    <td>UPDATE</td>
                                    <td>10:15</td>
                                </tr>
                                <tr>
                                    <td>LOGOUT</td>
                                    <td>11:30</td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>

</html>
