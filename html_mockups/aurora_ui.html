<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aurora UI Profile Mockup</title>
    <style>
        :root {
            --bg-color: #0d1117;
            --text-color: #ffffff;
            --primary-color: #a5b4fc;
            --action-color: #f472b6;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            overflow-x: hidden;
            min-height: 100vh;
        }

        /* Animated Aurora Background */
        .aurora-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            background-color: var(--bg-color);
            background-image:
                radial-gradient(circle at 15% 50%, rgba(132, 59, 206, 0.25), transparent 25%),
                radial-gradient(circle at 85% 30%, rgba(68, 126, 237, 0.25), transparent 25%),
                radial-gradient(circle at 50% 80%, rgba(206, 59, 147, 0.15), transparent 40%);
            filter: blur(80px);
            animation: aurora-move 20s infinite alternate;
        }

        @keyframes aurora-move {
            0% {
                transform: scale(1);
            }

            100% {
                transform: scale(1.1);
            }
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 60px 20px;
            display: grid;
            grid-template-columns: 280px 1fr;
            gap: 40px;
            position: relative;
            z-index: 10;
        }

        /* Components */
        .card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 16px;
            padding: 24px;
            margin-bottom: 24px;
            transition: all 0.3s;
        }

        .card:hover {
            background: rgba(255, 255, 255, 0.06);
            border-color: rgba(255, 255, 255, 0.15);
        }

        .btn {
            padding: 10px 20px;
            border-radius: 999px;
            /* Pill shape */
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            border: 1px solid rgba(255, 255, 255, 0.2);
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
            backdrop-filter: blur(10px);
            font-size: 0.9rem;
        }

        .btn:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: translateY(-2px);
            box-shadow: 0 0 20px -5px rgba(255, 255, 255, 0.3);
        }

        .btn.primary {
            background: var(--primary-color);
            color: #000;
            border: none;
        }

        .btn.action {
            background: var(--action-color);
            color: #000;
            border: none;
        }

        /* Sidebar Profile */
        .avatar {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background: linear-gradient(135deg, #a5b4fc, #818cf8);
            margin: 0 auto 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            color: #fff;
            box-shadow: 0 0 30px rgba(165, 180, 252, 0.3);
        }

        .nav-link {
            display: block;
            padding: 12px;
            color: rgba(255, 255, 255, 0.6);
            text-decoration: none;
            border-radius: 8px;
            transition: 0.2s;
        }

        .nav-link:hover,
        .nav-link.active {
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.1);
            color: #fff;
            background: rgba(255, 255, 255, 0.05);
        }

        /* Form */
        .aurora-input {
            width: 100%;
            padding: 12px;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            color: #fff;
            margin-bottom: 5px;
            outline: none;
        }

        .aurora-input:focus {
            border-color: var(--primary-color);
            box-shadow: 0 0 15px rgba(165, 180, 252, 0.2);
        }

        /* Checkbox & Radio */
        .check-container {
            display: flex;
            gap: 15px;
            margin-top: 10px;
        }

        .aurora-check {
            appearance: none;
            width: 18px;
            height: 18px;
            border: 1px solid rgba(255, 255, 255, 0.5);
            background: rgba(255, 255, 255, 0.1);
            border-radius: 4px;
            cursor: pointer;
            position: relative;
        }

        .aurora-check:checked {
            background: var(--primary-color);
            box-shadow: 0 0 10px var(--primary-color);
            border-color: var(--primary-color);
        }

        .aurora-radio {
            border-radius: 50%;
        }

        /* Chart */
        .chart-visual {
            height: 180px;
            display: flex;
            align-items: flex-end;
            justify-content: space-around;
            padding-top: 20px;
        }

        .glow-bar {
            width: 15%;
            background: linear-gradient(to top, rgba(165, 180, 252, 0.1), var(--primary-color));
            border-radius: 5px 5px 0 0;
            position: relative;
        }

        .glow-bar::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: inherit;
            filter: blur(10px);
            opacity: 0.7;
        }

        /* Table */
        table {
            width: 100%;
            border-collapse: collapse;
        }

        th {
            text-align: left;
            color: rgba(255, 255, 255, 0.5);
            padding: 10px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        td {
            padding: 15px 10px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        tr:hover td {
            background: rgba(255, 255, 255, 0.05);
        }
    </style>
</head>

<body>
    <div class="aurora-bg"></div>
    <div class="container">
        <!-- Sidebar -->
        <div class="card">
            <div class="avatar">✨</div>
            <h2 style="text-align: center; margin-bottom: 5px;">Aurora User</h2>
            <p style="text-align: center; color: rgba(255,255,255,0.5); margin-top: 0; margin-bottom: 30px;">UI
                Enthusiast</p>

            <a href="#" class="nav-link active">Overview</a>
            <a href="#" class="nav-link">Design System</a>
            <a href="#" class="nav-link">Settings</a>

            <div style="margin-top: 40px; padding: 15px; border-top: 1px solid rgba(255,255,255,0.1);">
                <label style="font-size: 12px; letter-spacing: 1px; color: rgba(255,255,255,0.5);">PREFERENCES</label>
                <div style="margin-top: 10px;">
                    <label style="display: flex; align-items: center; gap: 10px; margin-bottom: 8px;">
                        <input type="checkbox" class="aurora-check" checked> <span>Auto-Save</span>
                    </label>
                    <label style="display: flex; align-items: center; gap: 10px;">
                        <input type="checkbox" class="aurora-check"> <span>Notifications</span>
                    </label>
                </div>
            </div>
        </div>

        <!-- Main Content -->
        <div>
            <!-- Form Card -->
            <div class="card">
                <h2 style="margin-top: 0;">Edit Profile</h2>
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px;">
                    <div>
                        <label style="display: block; margin-bottom: 8px; color: rgba(255,255,255,0.7);">Full
                            Name</label>
                        <input type="text" class="aurora-input" value="Aurora User">
                    </div>
                    <div>
                        <label style="display: block; margin-bottom: 8px; color: rgba(255,255,255,0.7);">Email</label>
                        <input type="email" class="aurora-input" value="user@aurora.ui">
                    </div>
                </div>

                <div style="margin-bottom: 25px;">
                    <label style="display: block; margin-bottom: 8px; color: rgba(255,255,255,0.7);">Theme Mode</label>
                    <div class="check-container">
                        <label style="display: flex; align-items: center; gap: 8px;">
                            <input type="radio" name="theme" class="aurora-check aurora-radio" checked>
                            <span>Dark</span>
                        </label>
                        <label style="display: flex; align-items: center; gap: 8px;">
                            <input type="radio" name="theme" class="aurora-check aurora-radio"> <span>Midnight</span>
                        </label>
                    </div>
                </div>

                <div style="display: flex; gap: 15px;">
                    <button class="btn primary">Save Changes</button>
                    <button class="btn">Cancel</button>
                    <button class="btn action" style="margin-left: auto;">Delete Account</button>
                </div>
            </div>

            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
                <!-- Chart Card -->
                <div class="card">
                    <h3 style="margin-top: 0; font-size: 1rem;">Performance</h3>
                    <div class="chart-visual">
                        <div class="glow-bar" style="height: 40%"></div>
                        <div class="glow-bar" style="height: 70%"></div>
                        <div class="glow-bar" style="height: 50%"></div>
                        <div class="glow-bar"
                            style="height: 85%; background: linear-gradient(to top, rgba(244, 114, 182, 0.1), var(--action-color));">
                        </div>
                        <div class="glow-bar" style="height: 60%"></div>
                    </div>
                </div>

                <!-- Table Card -->
                <div class="card">
                    <h3 style="margin-top: 0; font-size: 1rem;">Recent Logins</h3>
                    <table>
                        <thead>
                            <tr>
                                <th>Device</th>
                                <th>Time</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr>
                                <td>Chrome / Mac</td>
                                <td>Now</td>
                            </tr>
                            <tr>
                                <td>Safari / iOS</td>
                                <td>2h ago</td>
                            </tr>
                            <tr>
                                <td>Firefox / Win</td>
                                <td>Yesterday</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</body>

</html>
