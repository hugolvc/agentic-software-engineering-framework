<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Claymorphism Profile Mockup</title>
    <style>
        :root {
            --primary-color: #007BFF;
            --action-color: #ff9800;
            --bg-color: #eef2f5;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            padding: 40px;
            min-height: 100vh;
        }

        .container {
            width: 1000px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: 280px 1fr;
            gap: 40px;
        }

        /* Clay Styles */
        .clay-card {
            background: #fff;
            border-radius: 30px;
            box-shadow:
                8px 8px 16px #d1d9e6,
                -8px -8px 16px #ffffff;
            padding: 30px;
            transition: all 0.3s ease;
        }

        .clay-input {
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 15px;
            background: #eef2f5;
            box-shadow: inset 5px 5px 10px #d1d9e6,
                inset -5px -5px 10px #ffffff;
            font-family: inherit;
            margin-bottom: 15px;
            color: #555;
        }

        .clay-btn {
            background-color: var(--primary-color);
            color: #fff;
            border: none;
            padding: 12px 25px;
            border-radius: 50px;
            font-weight: 600;
            cursor: pointer;
            box-shadow:
                6px 6px 12px rgba(0, 123, 255, 0.4),
                -6px -6px 12px rgba(255, 255, 255, 0.8),
                inset 2px 2px 5px rgba(255, 255, 255, 0.4),
                inset -2px -2px 5px rgba(0, 0, 0, 0.1);
            transition: transform 0.2s;
        }

        .clay-btn.secondary {
            background-color: #eef2f5;
            color: #555;
            box-shadow:
                6px 6px 12px #d1d9e6,
                -6px -6px 12px #ffffff;
        }

        .clay-btn.action {
            background-color: var(--action-color);
            box-shadow:
                6px 6px 12px rgba(255, 152, 0, 0.4),
                -6px -6px 12px rgba(255, 255, 255, 0.8),
                inset 2px 2px 5px rgba(255, 255, 255, 0.4),
                inset -2px -2px 5px rgba(0, 0, 0, 0.1);
        }

        .clay-btn:active {
            transform: translateY(2px);
        }

        /* Sidebar content */
        .clay-avatar {
            width: 120px;
            height: 120px;
            background-color: #ffd1d1;
            border-radius: 50%;
            box-shadow:
                inset 4px 4px 8px rgba(255, 255, 255, 0.5),
                inset -4px -4px 8px rgba(0, 0, 0, 0.1),
                5px 5px 10px rgba(0, 0, 0, 0.1);
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 50px;
            margin: 0 auto 20px;
            border: 4px solid #fff;
        }

        .nav-item {
            display: block;
            padding: 15px;
            margin-bottom: 10px;
            background: #eef2f5;
            border-radius: 15px;
            color: #555;
            text-decoration: none;
            font-weight: 600;
            transition: 0.2s;
        }

        .nav-item:hover,
        .nav-item.active {
            background: #fff;
            box-shadow: 5px 5px 10px #d1d9e6, -5px -5px 10px #ffffff;
            color: var(--primary-color);
        }

        /* Clay Checkbox */
        .clay-check {
            appearance: none;
            width: 24px;
            height: 24px;
            background: #eef2f5;
            border-radius: 8px;
            box-shadow: inset 3px 3px 6px #d1d9e6, inset -3px -3px 6px #ffffff;
            cursor: pointer;
            position: relative;
            vertical-align: middle;
            margin-right: 10px;
        }

        .clay-check:checked {
            background: var(--primary-color);
        }

        .clay-radio {
            border-radius: 50%;
        }

        /* Chart */
        .chart-bg {
            height: 200px;
            background: #eef2f5;
            border-radius: 20px;
            box-shadow: inset 5px 5px 10px #d1d9e6, inset -5px -5px 10px #ffffff;
            padding: 20px;
            display: flex;
            align-items: flex-end;
            justify-content: space-around;
        }

        .bar {
            width: 30px;
            background: var(--primary-color);
            border-radius: 10px;
            box-shadow:
                5px 5px 10px rgba(0, 123, 255, 0.3),
                inset 2px 2px 5px rgba(255, 255, 255, 0.4);
        }

        /* Table */
        .clay-row {
            display: flex;
            justify-content: space-between;
            background: #fff;
            padding: 15px;
            border-radius: 15px;
            margin-bottom: 10px;
            box-shadow: 5px 5px 10px #d1d9e6, -5px -5px 10px #ffffff;
            align-items: center;
        }
    </style>
</head>

<body>
    <div class="container">
        <!-- Sidebar -->
        <div class="clay-card">
            <div class="clay-avatar">😎</div>
            <h2 style="text-align: center; margin-bottom: 5px;">Clay User</h2>
            <p style="text-align: center; color: #888; margin-top: 0; margin-bottom: 30px;">Product Owner</p>

            <a href="#" class="nav-item active">Overview</a>
            <a href="#" class="nav-item">Reports</a>
            <a href="#" class="nav-item">Settings</a>

            <div style="margin-top: 40px;">
                <label style="display: block; margin-bottom: 15px; font-weight: 600; color: #555;">Preferences</label>
                <div style="margin-bottom: 10px;">
                    <input type="checkbox" class="clay-check" checked> <span style="color: #666;">Dark Mode</span>
                </div>
                <div>
                    <input type="checkbox" class="clay-check"> <span style="color: #666;">Animations</span>
                </div>
            </div>
        </div>

        <!-- Main Content -->
        <div style="display: flex; flex-direction: column; gap: 30px;">
            <!-- Form Card -->
            <div class="clay-card">
                <h2 style="margin-top: 0; color: #333;">Edit Profile</h2>
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
                    <div>
                        <label style="display: block; margin-bottom: 8px; color: #666; font-weight: 600;">Name</label>
                        <input type="text" class="clay-input" value="Clay User">
                    </div>
                    <div>
                        <label style="display: block; margin-bottom: 8px; color: #666; font-weight: 600;">Role</label>
                        <input type="text" class="clay-input" value="Product Owner">
                    </div>
                </div>

                <div style="margin-bottom: 20px;">
                    <label
                        style="display: block; margin-bottom: 10px; color: #666; font-weight: 600;">Subscription</label>
                    <div style="display: flex; gap: 20px;">
                        <label style="display: flex; align-items: center;">
                            <input type="radio" name="sub" class="clay-check clay-radio" checked> <span>Pro</span>
                        </label>
                        <label style="display: flex; align-items: center;">
                            <input type="radio" name="sub" class="clay-check clay-radio"> <span>Basic</span>
                        </label>
                    </div>
                </div>

                <div style="display: flex; gap: 15px; margin-top: 20px;">
                    <button class="clay-btn">Save Changes</button>
                    <button class="clay-btn secondary">Cancel</button>
                    <button class="clay-btn action" style="margin-left: auto;">Delete</button>
                </div>
            </div>

            <!-- Stats/Chart Card -->
            <div class="clay-card">
                <h2 style="margin-top: 0; color: #333;">Usage Statistics</h2>
                <div class="chart-bg">
                    <div class="bar" style="height: 40%"></div>
                    <div class="bar" style="height: 70%"></div>
                    <div class="bar" style="height: 50%"></div>
                    <div class="bar" style="height: 90%; background-color: var(--action-color);"></div>
                    <div class="bar" style="height: 60%"></div>
                    <div class="bar" style="height: 30%"></div>
                </div>
            </div>

            <!-- Table Section -->
            <div>
                <h3 style="color: #555; margin-left: 10px;">Recent Activity</h3>
                <div class="clay-row">
                    <span style="font-weight: 600; color: #333;">Project Alpha</span>
                    <span style="color: #888;">Updated 2h ago</span>
                    <span style="color: var(--primary-color);">Active</span>
                </div>
                <div class="clay-row">
                    <span style="font-weight: 600; color: #333;">Project Beta</span>
                    <span style="color: #888;">Updated 5h ago</span>
                    <span style="color: #888;">Pending</span>
                </div>
                <div class="clay-row">
                    <span style="font-weight: 600; color: #333;">Project Gamma</span>
                    <span style="color: #888;">Updated 1d ago</span>
                    <span style="color: var(--action-color);">Critical</span>
                </div>
            </div>
        </div>
    </div>
</body>

</html>
