<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Windows 3.11 Profile Mockup</title>
    <style>
        :root {
            --win-gray: #C0C0C0;
            --win-dark: #808080;
            --win-blue: #000080;
            --win-white: #FFFFFF;
            --win-black: #000000;
        }

        body {
            background-color: #008080;
            /* Teal Desktop */
            font-family: 'Times New Roman', serif;
            margin: 0;
            padding: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        .window {
            width: 800px;
            background-color: var(--win-gray);
            border: 2px solid var(--win-white);
            border-right-color: var(--win-black);
            border-bottom-color: var(--win-black);
            padding: 2px;
            box-shadow: 4px 4px 0px rgba(0, 0, 0, 0.5);
            position: relative;
        }

        .title-bar {
            background-color: var(--win-blue);
            color: var(--win-white);
            padding: 2px 5px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-weight: bold;
            font-family: sans-serif;
            font-size: 14px;
        }

        .menu-bar {
            display: flex;
            padding: 2px 5px;
            border-bottom: 1px solid var(--win-dark);
            margin-bottom: 5px;
            font-family: sans-serif;
            font-size: 13px;
        }

        .menu-item {
            margin-right: 15px;
            text-decoration: underline;
            text-decoration-thickness: 1px;
            text-underline-offset: 2px;
            cursor: default;
        }

        .client-area {
            border: 2px solid var(--win-dark);
            border-right-color: var(--win-white);
            border-bottom-color: var(--win-white);
            background-color: var(--win-white);
            padding: 10px;
            height: 400px;
            overflow: auto;
            font-family: 'Arial', sans-serif;
            font-size: 13px;
        }

        /* Controls */
        .btn-win {
            background-color: var(--win-gray);
            border: 2px solid var(--win-white);
            border-right-color: var(--win-black);
            border-bottom-color: var(--win-black);
            padding: 4px 15px;
            font-family: sans-serif;
            font-size: 13px;
            font-weight: bold;
            color: #000;
            min-width: 80px;
            text-align: center;
            cursor: default;
        }

        .btn-win:active {
            border: 2px solid var(--win-black);
            border-right-color: var(--win-white);
            border-bottom-color: var(--win-white);
            padding: 5px 14px 3px 16px;
        }

        .control-box {
            width: 16px;
            height: 16px;
            background-color: var(--win-gray);
            border: 1px solid var(--win-white);
            border-right-color: var(--win-black);
            border-bottom-color: var(--win-black);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 10px;
            color: #000;
        }

        .win-input {
            border: 1px solid var(--win-dark);
            border-right-color: var(--win-white);
            border-bottom-color: var(--win-white);
            padding: 3px;
            font-family: inherit;
            width: 150px;
        }

        /* Layout Grid */
        .grid-layout {
            display: grid;
            grid-template-columns: 200px 1fr;
            gap: 10px;
            height: 100%;
        }

        /* Sidebar Like (MDI Window) */
        .mdi-window {
            border: 2px solid var(--win-gray);
            border-top-color: var(--win-white);
            border-left-color: var(--win-white);
            border-right-color: var(--win-dark);
            border-bottom-color: var(--win-dark);
            background: var(--win-gray);
            padding: 5px;
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .avatar-box {
            width: 80px;
            height: 80px;
            background: var(--win-white);
            border: 1px solid var(--win-dark);
            margin: 0 auto;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
        }

        fieldset {
            border: 1px solid var(--win-gray);
            border-top: 1px solid var(--win-white);
            border-left: 1px solid var(--win-white);
            border-right: 1px solid var(--win-dark);
            border-bottom: 1px solid var(--win-dark);
            padding: 10px;
            margin-bottom: 10px;
        }

        legend {
            padding: 0 5px;
        }

        /* Chart 3.11 */
        .chart-311 {
            height: 120px;
            background: var(--win-white);
            border: 1px solid var(--win-black);
            display: flex;
            align-items: flex-end;
            padding: 5px;
            gap: 5px;
        }

        .bar-311 {
            flex: 1;
            background: var(--win-blue);
            border: 1px solid var(--win-black);
            /* Dithering pattern often used in 16-color VGA */
            background-image: linear-gradient(45deg, #000 25%, transparent 25%, transparent 75%, #000 75%, #000),
                linear-gradient(45deg, #000 25%, transparent 25%, transparent 75%, #000 75%, #000);
            background-size: 4px 4px;
            background-position: 0 0, 2px 2px;
            opacity: 0.5;
        }

        /* Table */
        table {
            width: 100%;
            border: 1px solid var(--win-black);
            border-collapse: collapse;
            background: var(--win-white);
        }

        th {
            background: var(--win-gray);
            border: 1px solid var(--win-black);
            padding: 2px;
            text-align: left;
            font-weight: normal;
        }

        td {
            border: 1px solid var(--win-gray);
            /* Grid lines were often gray or dotted */
            padding: 2px;
        }
    </style>
</head>

<body>
    <div class="window">
        <div class="title-bar">
            <div style="display: flex; align-items: center; gap: 5px;">
                <div class="control-box">-</div>
                <span>User Profile Manager</span>
            </div>
            <div style="display: flex; gap: 2px;">
                <div class="control-box">▼</div>
                <div class="control-box">▲</div>
            </div>
        </div>

        <div class="menu-bar">
            <div class="menu-item"><span style="text-decoration: underline;">F</span>ile</div>
            <div class="menu-item"><span style="text-decoration: underline;">E</span>dit</div>
            <div class="menu-item"><span style="text-decoration: underline;">V</span>iew</div>
            <div class="menu-item"><span style="text-decoration: underline;">H</span>elp</div>
        </div>

        <div class="client-area">
            <div class="grid-layout">
                <!-- Left Panel -->
                <div class="mdi-window">
                    <div class="avatar-box">👤</div>
                    <div style="text-align: center; font-weight: bold; margin-bottom: 10px;">User386</div>

                    <button class="btn-win"
                        style="width: 100%; text-align: left; margin-bottom: 2px;">Properties...</button>
                    <button class="btn-win"
                        style="width: 100%; text-align: left; margin-bottom: 2px;">Statistics</button>
                    <button class="btn-win" style="width: 100%; text-align: left;">Exit Windows</button>

                    <fieldset style="margin-top: 20px;">
                        <legend>Options</legend>
                        <div>
                            <input type="checkbox" id="chk1" checked>
                            <label for="chk1">Sound</label>
                        </div>
                        <div>
                            <input type="checkbox" id="chk2">
                            <label for="chk2">Fast Disk</label>
                        </div>
                    </fieldset>
                </div>

                <!-- Right Panel -->
                <div style="display: flex; flex-direction: column; gap: 10px;">
                    <!-- Form -->
                    <fieldset>
                        <legend>User Information</legend>
                        <div style="display: flex; gap: 20px; margin-bottom: 10px;">
                            <div>
                                <label style="display: block;">Name:</label>
                                <input type="text" class="win-input" value="Bill Gates">
                            </div>
                            <div>
                                <label style="display: block;">Company:</label>
                                <input type="text" class="win-input" value="Microsoft">
                            </div>
                        </div>

                        <div>
                            <label style="display: block;">Mode:</label>
                            <div style="display: flex; gap: 10px;">
                                <div><input type="radio" name="mode" checked> Standard</div>
                                <div><input type="radio" name="mode"> Enhanced 386</div>
                            </div>
                        </div>

                        <div style="display: flex; justify-content: flex-end; gap: 10px; margin-top: 10px;">
                            <button class="btn-win">OK</button>
                            <button class="btn-win">Cancel</button>
                            <button class="btn-win" style="font-style: italic;">Help</button>
                        </div>
                    </fieldset>

                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
                        <!-- Chart -->
                        <fieldset>
                            <legend>System Resources</legend>
                            <div class="chart-311">
                                <div class="bar-311" style="height: 40%"></div>
                                <div class="bar-311" style="height: 80%"></div>
                                <div class="bar-311" style="height: 60%"></div>
                                <div class="bar-311" style="height: 90%; background: #000; opacity: 1;"></div>
                            </div>
                        </fieldset>

                        <!-- Table -->
                        <fieldset>
                            <legend>Active Tasks</legend>
                            <table>
                                <tr>
                                    <th>Task</th>
                                    <th>PID</th>
                                </tr>
                                <tr>
                                    <td>PROGMAN</td>
                                    <td>1024</td>
                                </tr>
                                <tr>
                                    <td>WINFILE</td>
                                    <td>2048</td>
                                </tr>
                                <tr>
                                    <td>SOL</td>
                                    <td>4096</td>
                                </tr>
                            </table>
                        </fieldset>
                    </div>
                </div>
            </div>
        </div>

        <div style="border-top: 1px solid var(--win-white); padding: 2px;">
            Press F1 for Help
        </div>
    </div>
</body>

</html>
