<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neumorphism Profile Mockup</title>
    <style>
        :root {
            --bg-color: #e0e5ec;
            --primary-color: #007BFF;
            --action-color: #ff9800;
            --text-color: #4a4a4a;
            --neu-shadow-light: #ffffff;
            --neu-shadow-dark: #a3b1c6;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Nunito', sans-serif;
            margin: 0;
            padding: 40px;
            min-height: 100vh;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: 300px 1fr;
            gap: 40px;
        }

        /* Neumorphism Utilities */
        .neu-flat {
            border-radius: 20px;
            background: var(--bg-color);
            box-shadow: 9px 9px 16px var(--neu-shadow-dark),
                -9px -9px 16px var(--neu-shadow-light);
        }

        .neu-pressed {
            border-radius: 15px;
            background: var(--bg-color);
            box-shadow: inset 5px 5px 10px var(--neu-shadow-dark),
                inset -5px -5px 10px var(--neu-shadow-light);
        }

        .neu-btn {
            padding: 12px 24px;
            border-radius: 50px;
            border: none;
            outline: none;
            background: var(--bg-color);
            color: var(--primary-color);
            font-weight: 700;
            cursor: pointer;
            box-shadow: 6px 6px 12px var(--neu-shadow-dark),
                -6px -6px 12px var(--neu-shadow-light);
            transition: all 0.2s ease;
        }

        .neu-btn:hover {
            transform: translateY(-2px);
        }

        .neu-btn:active {
            box-shadow: inset 4px 4px 8px var(--neu-shadow-dark),
                inset -4px -4px 8px var(--neu-shadow-light);
            transform: translateY(0);
        }

        .neu-btn.action {
            color: var(--action-color);
        }

        /* Profile Sidebar */
        .sidebar {
            padding: 30px;
            text-align: center;
        }

        .avatar {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            margin: 0 auto 20px;
            border: 5px solid var(--bg-color);
            box-shadow: 6px 6px 12px var(--neu-shadow-dark),
                -6px -6px 12px var(--neu-shadow-light);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
            color: var(--primary-color);
        }

        /* Main Content */
        .main-content {
            display: flex;
            flex-direction: column;
            gap: 30px;
        }

        .card {
            padding: 30px;
        }

        h2 {
            margin-top: 0;
            color: var(--primary-color);
        }

        /* Form Elements */
        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
        }

        input[type="text"],
        input[type="email"] {
            width: 100%;
            padding: 12px;
            border: none;
            outline: none;
            box-sizing: border-box;
            color: var(--text-color);
        }

        /* Checkbox & Radio */
        .check-radio-group {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
            align-items: center;
        }

        .custom-control {
            display: flex;
            align-items: center;
            cursor: pointer;
        }

        .control-indicator {
            width: 20px;
            height: 20px;
            margin-right: 10px;
            position: relative;
        }

        .control-indicator::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 10px;
            height: 10px;
            background: var(--primary-color);
            opacity: 0;
            transition: opacity 0.2s;
        }

        input:checked+.control-indicator::after {
            opacity: 1;
        }

        .radio .control-indicator {
            border-radius: 50%;
        }

        .radio .control-indicator::after {
            border-radius: 50%;
        }

        .checkbox .control-indicator {
            border-radius: 4px;
        }

        .checkbox .control-indicator::after {
            border-radius: 2px;
        }

        /* Data Table */
        table {
            width: 100%;
            border-collapse: separate;
            border-spacing: 0 10px;
        }

        th {
            text-align: left;
            padding: 10px;
            color: var(--primary-color);
        }

        td {
            padding: 15px;
            background: var(--bg-color);
        }

        tr {
            box-shadow: 5px 5px 10px var(--neu-shadow-dark),
                -5px -5px 10px var(--neu-shadow-light);
            border-radius: 10px;
        }

        tr td:first-child {
            border-top-left-radius: 10px;
            border-bottom-left-radius: 10px;
        }

        tr td:last-child {
            border-top-right-radius: 10px;
            border-bottom-right-radius: 10px;
        }

        /* Chart */
        .chart-container {
            height: 200px;
            display: flex;
            align-items: flex-end;
            justify-content: space-around;
            padding: 20px;
        }

        .bar {
            width: 40px;
            background: var(--bg-color);
            border-radius: 10px;
            box-shadow: inset 3px 3px 6px var(--neu-shadow-dark),
                inset -3px -3px 6px var(--neu-shadow-light);
            position: relative;
        }

        .bar-fill {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            border-radius: 10px;
            background: var(--primary-color);
            opacity: 0.7;
        }
    </style>
</head>

<body>
    <div class="container">
        <!-- Sidebar -->
        <div class="sidebar neu-flat">
            <div class="avatar">👤</div>
            <h2>John Doe</h2>
            <p>UX Designer</p>
            <div style="margin-top: 30px;">
                <button class="neu-btn" style="width: 100%; margin-bottom: 15px;">Edit Profile</button>
                <button class="neu-btn action" style="width: 100%;">Log Out</button>
            </div>

            <div class="neu-flat" style="margin-top: 40px; padding: 20px; text-align: left;">
                <label>Skills</label>
                <div class="check-radio-group"
                    style="flex-direction: column; align-items: flex-start; gap: 10px; margin-top: 10px;">
                    <label class="custom-control checkbox">
                        <input type="checkbox" checked hidden>
                        <div class="control-indicator neu-pressed"></div>
                        CSS3
                    </label>
                    <label class="custom-control checkbox">
                        <input type="checkbox" checked hidden>
                        <div class="control-indicator neu-pressed"></div>
                        HTML5
                    </label>
                    <label class="custom-control checkbox">
                        <input type="checkbox" hidden>
                        <div class="control-indicator neu-pressed"></div>
                        JavaScript
                    </label>
                </div>
            </div>
        </div>

        <!-- Main Content -->
        <div class="main-content">
            <!-- Form Section -->
            <div class="card neu-flat">
                <h2>Profile Settings</h2>
                <div class="form-group">
                    <label>Full Name</label>
                    <input type="text" class="neu-pressed" value="John Doe">
                </div>
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" class="neu-pressed" value="john@example.com">
                </div>

                <div class="form-group">
                    <label>Notifications</label>
                    <div class="check-radio-group">
                        <label class="custom-control radio">
                            <input type="radio" name="notif" checked hidden>
                            <div class="control-indicator neu-pressed"></div>
                            Instant
                        </label>
                        <label class="custom-control radio">
                            <input type="radio" name="notif" hidden>
                            <div class="control-indicator neu-pressed"></div>
                            Daily
                        </label>
                        <label class="custom-control radio">
                            <input type="radio" name="notif" hidden>
                            <div class="control-indicator neu-pressed"></div>
                            Weekly
                        </label>
                    </div>
                </div>

                <div style="display: flex; gap: 15px; margin-top: 30px;">
                    <button class="neu-btn">Save Changes</button>
                    <button class="neu-btn">Discard</button>
                    <button class="neu-btn action" style="margin-left: auto;">Delete Account</button>
                </div>
            </div>

            <!-- Chart Section -->
            <div class="card neu-flat">
                <h2>Activity Overview</h2>
                <div class="chart-container">
                    <div class="bar" style="height: 60%">
                        <div class="bar-fill" style="height: 100%"></div>
                    </div>
                    <div class="bar" style="height: 80%">
                        <div class="bar-fill" style="height: 100%"></div>
                    </div>
                    <div class="bar" style="height: 45%">
                        <div class="bar-fill" style="height: 100%"></div>
                    </div>
                    <div class="bar" style="height: 90%">
                        <div class="bar-fill" style="height: 100%"></div>
                    </div>
                    <div class="bar" style="height: 30%">
                        <div class="bar-fill" style="height: 100%"></div>
                    </div>
                </div>
            </div>

            <!-- Data Table Section -->
            <div class="card neu-flat">
                <h2>Recent Projects</h2>
                <table>
                    <thead>
                        <tr>
                            <th>Project</th>
                            <th>Status</th>
                            <th>Due Date</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr>
                            <td>Neumorphism UI Kit</td>
                            <td>Active</td>
                            <td>Oct 20, 2024</td>
                        </tr>
                        <tr>
                            <td>Client Website</td>
                            <td>Pending</td>
                            <td>Nov 15, 2024</td>
                        </tr>
                        <tr>
                            <td>Mobile App Design</td>
                            <td>Done</td>
                            <td>Sep 01, 2024</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</body>

</html>
